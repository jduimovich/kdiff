  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    app: hacbs-jvm-operator
  name: hacbs-jvm-operator-monitor
  namespace: jvm-build-service
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: http-metrics
    port: 8080
    protocol: TCP
    targetPort: 8080
  - name: probes
    port: 8081
    protocol: TCP
    targetPort: 8081
  selector:
    app: hacbs-jvm-operator
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    app: hacbs-jvm-operator
  name: hacbs-jvm-operator
  namespace: jvm-build-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hacbs-jvm-operator
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
      labels:
        app: hacbs-jvm-operator
    spec:
      containers:
      - args:
        - --v=4
        - --zap-log-level=info
        env:
        - name: IMAGE_TAG
          value: 8d0f3e447e81965939e00b29624beaf35efbaa90
        image: quay.io/redhat-appstudio/hacbs-jvm-controller:8d0f3e447e81965939e00b29624beaf35efbaa90
        imagePullPolicy: IfNotPresent
        name: hacbs-jvm-operator
        ports:
        - containerPort: 8080
          name: http-metrics
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 512Mi
        securityContext:
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /workspace
          name: quaytoken
          readOnly: true
      securityContext:
        runAsNonRoot: true
      serviceAccountName: hacbs-jvm-operator
      volumes:
      - name: quaytoken
        secret:
          optional: false
          secretName: quaytoken
