apiVersion: v1
kind: Namespace
metadata:
  labels:
    openshift.io/cluster-monitoring: "true"
  name: sprayproxy
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sprayproxy
  namespace: sprayproxy
---
apiVersion: v1
kind: Service
metadata:
  name: sprayproxy-metrics-service
  namespace: sprayproxy
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: https
  selector:
    app.kubernetes.io/name: sprayproxy
---
apiVersion: v1
kind: Service
metadata:
  name: sprayproxy-service
  namespace: sprayproxy
spec:
  ports:
  - name: server
    port: 8080
    protocol: TCP
  selector:
    app.kubernetes.io/name: sprayproxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: sprayproxy
  name: sprayproxy
  namespace: sprayproxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sprayproxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sprayproxy
    spec:
      containers:
      - args:
        - server
        env:
        - name: SPRAYPROXY_SERVER_BACKEND
          value: |
            https://pipelines-as-code-controller-pipelines-as-code.apps.stone-stg-m01.7ayg.p1.openshiftapps.com https://pipelines-as-code-controller-pipelines-as-code.apps.stone-stg-rh01.l2vh.p1.openshiftapps.com
        image: quay.io/redhat-appstudio/sprayproxy:b488cf7dada7cdf4767fd32f041c6ea3507f0043
        name: sprayproxy
        ports:
        - containerPort: 8080
          name: server
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
      - args:
        - --secure-listen-address=0.0.0.0:8443
        - --upstream=http://127.0.0.1:6000/
        - --logtostderr=true
        - --v=0
        image: registry.redhat.io/openshift4/ose-kube-rbac-proxy:v4.12
        name: kube-rbac-proxy
        ports:
        - containerPort: 8443
          name: https
          protocol: TCP
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 5m
            memory: 64Mi
      serviceAccountName: sprayproxy
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: sprayproxy-route
  namespace: sprayproxy
spec:
  tls:
    termination: edge
  to:
    kind: Service
    name: sprayproxy-service
