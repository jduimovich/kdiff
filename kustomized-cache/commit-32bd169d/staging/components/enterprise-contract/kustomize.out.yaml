                          items:
                            description: VolatileCriteria includes or excludes a policy
                              rule with effective dates as an option.
                            properties:
                              effectiveOn:
                                format: date-time
                                type: string
                              effectiveUntil:
                                format: date-time
                                type: string
                              value:
                                type: string
                            required:
                            - value
                            type: object
                          type: array
                          x-kubernetes-list-map-keys:
                          - value
                          x-kubernetes-list-type: map
