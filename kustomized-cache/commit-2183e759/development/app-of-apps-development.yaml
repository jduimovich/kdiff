apiVersion: v1
kind: Secret
metadata:
  labels:
    appstudio.redhat.com/host-cluster: "true"
    appstudio.redhat.com/member-cluster: "true"
    appstudio.redhat.com/quality-dashboard: "true"
    argocd.argoproj.io/secret-type: cluster
  name: cluster-kubernetes.default.svc
  namespace: openshift-gitops
stringData:
  config: '{"tlsClientConfig":{"insecure":false}}'
  name: in-cluster-local
  server: https://kubernetes.default.svc
type: Opaque
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: application-api
  namespace: openshift-gitops
spec:
  generators:
  - clusters:
      selector:
        matchLabels:
          appstudio.redhat.com/member-cluster: "true"
  template:
    metadata:
      name: application-api-{{nameNormalized}}
    spec:
      destination:
        namespace: application-api
        server: '{{server}}'
      project: default
      source:
        path: components/application-api
        repoURL: https://github.com/redhat-appstudio/infra-deployments.git
        targetRevision: main
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          backoff:
            duration: 15s
          limit: 50
        syncOptions:
        - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: build-service
  namespace: openshift-gitops
spec:
  generators:
  - merge:
      generators:
      - clusters:
          selector:
            matchLabels:
              appstudio.redhat.com/member-cluster: "true"
          values:
            clusterDir: ""
            environment: development
            sourceRoot: components/build-service
      - list:
          elements: []
      mergeKeys:
      - nameNormalized
  template:
    metadata:
      name: build-service-{{nameNormalized}}
    spec:
      destination:
        namespace: default
        server: '{{server}}'
      project: default
      source:
        path: '{{values.sourceRoot}}/{{values.environment}}/{{values.clusterDir}}'
        repoURL: https://github.com/redhat-appstudio/infra-deployments.git
        targetRevision: main
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
          limit: -1
        syncOptions:
        - CreateNamespace=true
---
