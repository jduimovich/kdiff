apiVersion: v1
kind: Namespace
metadata:
  labels:
    app: multi-platform-controller
  name: multi-platform-controller
---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app: multi-platform-controller
  name: multi-platform-controller
  namespace: multi-platform-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app: multi-platform-controller
  name: pipeline-anyuid-role
  namespace: multi-platform-controller
rules:
- apiGroups:
  - security.openshift.io
  resourceNames:
  - anyuid
  resources:
  - securitycontextconstraints
  verbs:
  - use
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app: multi-platform-controller
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
  name: multi-platform-controller
rules:
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
- apiGroups:
  - ""
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
  - create
  - delete
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - tekton.dev
  resources:
  - taskruns
  - taskruns/status
  verbs:
  - create
  - delete
  - deletecollection
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grant-argocd
  namespace: multi-platform-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
- kind: ServiceAccount
  name: openshift-gitops-argocd-application-controller
  namespace: openshift-gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app: multi-platform-controller
  name: pipeline-anyuid-rolebinding
  namespace: multi-platform-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pipeline-anyuid-role
subjects:
- kind: ServiceAccount
  name: pipeline
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app: multi-platform-controller
  name: multi-platform-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: multi-platform-controller
subjects:
- kind: ServiceAccount
  name: multi-platform-controller
  namespace: multi-platform-controller
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: multi-platform-controller
  name: multi-platform-controller-monitor
  namespace: multi-platform-controller
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: http-metrics
    port: 8080
    protocol: TCP
    targetPort: 8080
  - name: probes
    port: 8081
    protocol: TCP
    targetPort: 8081
  selector:
    app: multi-platform-controller
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: otp-tls-secrets
  labels:
    app: multi-platform-otp-server
  name: multi-platform-otp-server
  namespace: multi-platform-controller
spec:
  ports:
  - name: https
    port: 443
    protocol: TCP
    targetPort: 8443
  selector:
    app: multi-platform-otp-server
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: multi-platform-controller
  name: multi-platform-controller
  namespace: multi-platform-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multi-platform-controller
  template:
    metadata:
      labels:
        app: multi-platform-controller
    spec:
      containers:
      - args:
        - --v=4
        - --zap-log-level=4
        - --zap-devel=true
        - --zap-encoder=console
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: quay.io/redhat-user-workloads/rhtap-build-tenant/multi-arch-controller/multi-arch-controller:38cd27388b4c48856466d9822cad99a06070a90f
        imagePullPolicy: Always
        name: multi-platform-controller
        ports:
        - containerPort: 8080
          name: http-metrics
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 512Mi
        securityContext:
          readOnlyRootFilesystem: true
      securityContext:
        runAsNonRoot: true
      serviceAccountName: multi-platform-controller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: multi-platform-otp-server
  name: multi-platform-otp-server
  namespace: multi-platform-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multi-platform-otp-server
  template:
    metadata:
      labels:
        app: multi-platform-otp-server
    spec:
      containers:
      - env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: quay.io/redhat-user-workloads/rhtap-build-tenant/multi-arch-controller/multi-platform-controller-otp-service:38cd27388b4c48856466d9822cad99a06070a90f
        imagePullPolicy: Always
        name: multi-platform-otp-server
        ports:
        - containerPort: 8080
          name: server
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tls
          name: tls
      securityContext:
        runAsNonRoot: true
      volumes:
      - name: tls
        secret:
          secretName: otp-tls-secrets
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  labels:
    app: multi-platform-controller
  name: clean-shared-host
  namespace: multi-platform-controller
spec:
  description: This task will clean up after a build
  params:
  - name: SECRET_NAME
    type: string
  - name: TASKRUN_NAME
    type: string
  - name: NAMESPACE
    type: string
  - name: HOST
    type: string
  - name: USER
    type: string
  steps:
  - image: quay.io/redhat-appstudio/multi-platform-runner:01c7670e81d5120347cf0ad13372742489985e5f@sha256:246adeaaba600e207131d63a7f706cffdcdc37d8f600c56187123ec62823ff44
    imagePullPolicy: IfNotPresent
    name: provision
    script: |
      #!/bin/bash
      cd /tmp
      set -o verbose
      set -eu
      set -o pipefail
      cp $(workspaces.ssh.path)/id_rsa /tmp/master_key
      chmod 0400 /tmp/master_key
      export SSH_HOST=$(params.USER)@$(params.HOST)

      export USERNAME=u-$(echo $(params.TASKRUN_NAME)$(params.NAMESPACE) | md5sum | cut -b-28)
      ssh -i /tmp/master_key -o StrictHostKeyChecking=no $SSH_HOST sudo userdel -f -r -Z $USERNAME
  workspaces:
  - name: ssh
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  labels:
    app: multi-platform-controller
  name: provision-shared-host
  namespace: multi-platform-controller
spec:
  description: This task will create a new user on a host, setup ssh keys, and then
    create the relevant secret.
  params:
  - name: SECRET_NAME
    type: string
  - name: TASKRUN_NAME
    type: string
  - name: NAMESPACE
    type: string
  - name: HOST
    type: string
  - name: USER
    type: string
  steps:
  - image: quay.io/redhat-appstudio/multi-platform-runner:01c7670e81d5120347cf0ad13372742489985e5f@sha256:246adeaaba600e207131d63a7f706cffdcdc37d8f600c56187123ec62823ff44
    imagePullPolicy: IfNotPresent
    name: provision
    script: |
      #!/bin/bash
      cd /tmp
      set -o verbose
      set -eu
      set -o pipefail
      mkdir -p /root/.ssh
      cp $(workspaces.ssh.path)/id_rsa /tmp/master_key
      chmod 0400 /tmp/master_key
      export SSH_HOST=$(params.USER)@$(params.HOST)

      export USERNAME=u-$(echo $(params.TASKRUN_NAME)$(params.NAMESPACE) | md5sum | cut -b-28)

      cat >script.sh <<EOF
      sudo dnf install podman -y
      rm -f $USERNAME $USERNAME.pub
      sudo useradd -m $USERNAME -p $(openssl rand -base64 12)
      ssh-keygen -N '' -f $USERNAME
      sudo su $USERNAME -c 'mkdir /home/$USERNAME/.ssh'
      sudo su $USERNAME -c 'mkdir /home/$USERNAME/build'
      sudo cp $USERNAME.pub /home/$USERNAME/.ssh/authorized_keys
      sudo chown $USERNAME /home/$USERNAME/.ssh/authorized_keys
      EOF
      ssh -i /tmp/master_key -o StrictHostKeyChecking=no $SSH_HOST "bash -s" <script.sh
      ssh -i /tmp/master_key -o StrictHostKeyChecking=no $SSH_HOST cat $USERNAME  >id_rsa
      ssh -i /tmp/master_key -o StrictHostKeyChecking=no $SSH_HOST rm $USERNAME
      chmod 0400 id_rsa
      ssh -i id_rsa -o StrictHostKeyChecking=no $USERNAME@$(params.HOST) echo "test"
      HOST=$(echo $USERNAME@$(params.HOST) | base64 -w 0)
      DIR=$(echo /home/$USERNAME | base64 -w 0)

      if [ -e "/tls/tls.crt" ]; then
        KEY=$(cat id_rsa)
        OTP=$(curl --cacert /tls/tls.crt -XPOST -d "$KEY" https://multi-platform-otp-server.multi-platform-controller.svc.cluster.local/store-key | base64 -w 0)
        OTP_SERVER="$(echo https://multi-platform-otp-server.multi-platform-controller.svc.cluster.local/otp | base64 -w 0)"
        echo $OTP | base64 -d
        cat >secret.yaml <<EOF
        apiVersion: v1
        data:
          otp-ca: "$(cat /tls/tls.crt | base64 -w 0)"
          otp: "$OTP"
          otp-server: "$OTP_SERVER"
          host: "$HOST"
          user-dir: "$DIR"
        kind: Secret
        metadata:
          name: $(params.SECRET_NAME)
          namespace: $(params.NAMESPACE)
          labels:
            build.appstudio.redhat.com/multi-platform-secret: "true"
        type: Opaque
      EOF
      else
        KEY=$(cat id_rsa | base64 -w 0)
        cat >secret.yaml <<EOF
        apiVersion: v1
        data:
          id_rsa: "$KEY"
          host: "$HOST"
          user-dir: "$DIR"
        kind: Secret
        metadata:
          name: $(params.SECRET_NAME)
          namespace: $(params.NAMESPACE)
          labels:
            build.appstudio.redhat.com/multi-platform-secret: "true"
        type: Opaque
      EOF
      fi

      kubectl create -f secret.yaml
    volumeMounts:
    - mountPath: /tls
      name: tls
  volumes:
  - name: tls
    secret:
      optional: true
      secretName: otp-tls-secrets
  workspaces:
  - name: ssh
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  labels:
    app: multi-platform-controller
  name: update-host
  namespace: multi-platform-controller
spec:
  description: This task will create a new user on a host, setup ssh keys, and then
    create the relevant secret.
  params:
  - name: HOST
    type: string
  - name: USER
    type: string
  steps:
  - image: quay.io/redhat-appstudio/multi-platform-runner:01c7670e81d5120347cf0ad13372742489985e5f@sha256:246adeaaba600e207131d63a7f706cffdcdc37d8f600c56187123ec62823ff44
    imagePullPolicy: IfNotPresent
    name: provision
    script: |
      #!/bin/bash
      cd /tmp
      set -o verbose
      set -eu
      set -o pipefail
      mkdir -p /root/.ssh
      cp $(workspaces.ssh.path)/id_rsa /tmp/master_key
      chmod 0400 /tmp/master_key
      export SSH_HOST=$(params.USER)@$(params.HOST)
      ssh -i /tmp/master_key -o StrictHostKeyChecking=no $SSH_HOST "sudo dnf update -y"
  workspaces:
  - name: ssh
