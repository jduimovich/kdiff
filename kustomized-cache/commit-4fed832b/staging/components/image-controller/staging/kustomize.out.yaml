apiVersion: v1
kind: Service
metadata:
  labels:
    control-plane: controller-manager
  name: image-controller-controller-manager-metrics-service
  namespace: image-controller
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: https
  selector:
    control-plane: controller-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    control-plane: controller-manager
  name: image-controller-controller-manager
  namespace: image-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=127.0.0.1:8080
        - --leader-elect
        command:
        - /manager
        image: quay.io/redhat-appstudio/image-controller:65422167cd7d16d6e563ac110e5f7089144f0dd0
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 20Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /workspace
          name: quaytoken
          readOnly: true
      - args:
        - --http2-disable
        - --secure-listen-address=0.0.0.0:8443
        - --upstream=http://127.0.0.1:8080/
        - --logtostderr=true
        - --v=0
        image: gcr.io/kubebuilder/kube-rbac-proxy:v0.15.0
        name: kube-rbac-proxy
        ports:
        - containerPort: 8443
          name: https
          protocol: TCP
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 5m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: image-controller-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - name: quaytoken
        secret:
          secretName: quaytoken
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: image-controller-image-pruner-cronjob
  namespace: image-controller
spec:
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - command:
            - /bin/bash
            - -c
            - python /image-pruner/prune_images.py --namespace $(NAMESPACE)
            env:
            - name: QUAY_TOKEN
              valueFrom:
                secretKeyRef:
                  key: quaytoken
                  name: quaytoken
            - name: NAMESPACE
              valueFrom:
                secretKeyRef:
                  key: organization
                  name: quaytoken
            image: registry.redhat.io/rhel8/python-39:1-120.1684740828
            imagePullPolicy: IfNotPresent
            name: image-pruner
            resources:
              limits:
                cpu: 500m
                memory: 512Mi
              requests:
                cpu: 150m
                memory: 128Mi
            securityContext:
              readOnlyRootFilesystem: true
            volumeMounts:
            - mountPath: /image-pruner
              name: image-pruner-volume
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
          volumes:
          - configMap:
              name: image-controller-image-pruner-configmap-5848ggd264
            name: image-pruner-volume
          - name: quaytoken
            secret:
              secretName: quaytoken
  schedule: 0 0 * * *
