apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: application-api
  namespace: argocd-staging
spec:
  generators:
  - clusters:
      selector:
        matchLabels:
          appstudio.redhat.com/member-cluster: "true"
  template:
    metadata:
      name: application-api-{{nameNormalized}}
    spec:
      destination:
        namespace: application-api
        server: '{{server}}'
      project: default
      source:
        path: components/application-api
        repoURL: https://github.com/redhat-appstudio/infra-deployments.git
        targetRevision: main
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          backoff:
            duration: 15s
          limit: 50
        syncOptions:
        - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: authentication
  namespace: argocd-staging
spec:
  generators:
  - merge:
      generators:
      - clusters:
          selector:
            matchExpressions:
            - key: app.kubernetes.io/name
              operator: NotIn
              values:
              - argocd-default-cluster-config
            matchLabels:
              argocd.argoproj.io/secret-type: cluster
          values:
            clusterDir: ""
            environment: staging
            sourceRoot: components/authentication
      - list:
          elements: []
      mergeKeys:
      - nameNormalized
  template:
    metadata:
      name: authentication-{{nameNormalized}}
    spec:
      destination:
        namespace: default
        server: '{{server}}'
      project: default
      source:
        path: '{{values.sourceRoot}}/{{values.environment}}/{{values.clusterDir}}'
        repoURL: https://github.com/redhat-appstudio/infra-deployments.git
        targetRevision: main
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          backoff:
            duration: 15s
          limit: 50
        syncOptions:
        - CreateNamespace=true
