apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton-ci
  namespace: openshift-gitops
spec:
  destination:
    namespace: tekton-ci
    server: https://kubernetes.default.svc
  ignoreDifferences:
  - group: ""
    jqPathExpressions:
    - .imagePullSecrets[] | select(.name | startswith("pipeline-dockercfg"))
    kind: ServiceAccount
    name: pipeline
  project: default
  source:
    path: components/tekton-ci
    repoURL: https://github.com/redhat-appstudio/infra-deployments.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
      limit: -1
    syncOptions:
    - CreateNamespace=true
