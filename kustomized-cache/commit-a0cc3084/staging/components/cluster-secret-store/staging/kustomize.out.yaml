apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: appsre-stonesoup-vault
spec:
  conditions:
  - namespaces:
    - dora-metrics
    - application-service
    - appstudio-workload-monitoring
    - spi-system
    - group-sync-operator
    - build-templates
    - build-service
    - tekton-ci
    - image-controller
    - multi-platform-controller
    - jvm-build-service
    - openshift-logging
    - sprayproxy
    - appstudio-monitoring
    - openshift-pipelines
    - rhtap-servicerelease-tenant
    - rhtap-build-tenant
    - rhtap-o11y-tenant
    - admin-checker
  provider:
    vault:
      auth:
        appRole:
          path: approle
          roleId: d2d9c931-5fce-7b40-bf69-f4ee411ee891
          secretRef:
            key: secret-id
            name: appsre-vault
            namespace: appsre-vault
      path: stonesoup
      server: https://vault.ci.ext.devshift.net
      version: v2
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: appsre-vault
spec:
  conditions:
  - namespaces:
    - tekton-results
    - gitops
    - spi-system
    - remotesecret
  provider:
    vault:
      auth:
        appRole:
          path: approle
          roleId: d2d9c931-5fce-7b40-bf69-f4ee411ee891
          secretRef:
            key: secret-id
            name: appsre-vault
            namespace: appsre-vault
      path: app-sre
      server: https://vault.ci.ext.devshift.net
      version: v1
